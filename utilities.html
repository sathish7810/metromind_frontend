<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetroMind - Utility Grids</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="layout-container">
    <!-- Dynamic Sidebar injected here -->
    <div id="sidebar-container"></div>

    <main class="main-content">
      <header class="content-header">
        <div class="header-title-area">
          <h1>Utility Grid Monitoring</h1>
          <p>Oversee municipal resource loads, capacity thresholds, and active outages</p>
        </div>
      </header>

      <!-- Grids Status Cards -->
      <section id="grids-grid" class="grid-container">
        <div class="card" style="grid-column: span 3; text-align: center; padding: 40px 0;">
          <p class="info-label">Loading utility grids status...</p>
        </div>
      </section>

      <!-- Recent Outage Registrations Session Log -->
      <section class="card" style="margin-top: 16px;">
        <h2 class="stat-label" style="margin-bottom: 12px;">Active Outages Registered Log</h2>
        <div class="table-responsive">
          <table class="custom-table">
            <thead>
              <tr>
                <th>Grid Target</th>
                <th>Outage Type</th>
                <th>Affected Area</th>
                <th>Severity</th>
                <th>Est. Restoration</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="outages-log-body">
              <tr>
                <td colspan="6" class="info-label" style="text-align: center; padding: 20px 0;">No outages reported in this session.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Register Outage Modal -->
  <div id="outage-modal" class="modal-overlay">
    <div class="modal-container">
      <div class="modal-header">
        <h3 class="modal-title">Register Utility Outage</h3>
        <button id="close-modal-btn" class="modal-close">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/></svg>
        </button>
      </div>
      <form id="outage-form">
        <input type="hidden" id="outage-grid-id">
        <div class="modal-body" style="display: flex; flex-direction: column; gap: 16px;">
          <div class="form-group">
            <label class="form-label">Target Grid</label>
            <input type="text" id="outage-grid-name" class="form-control" readonly style="opacity: 0.7;">
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="form-group">
              <label for="outageType" class="form-label">Outage Type</label>
              <select id="outageType" class="form-control" required>
                <option value="" disabled selected>Select type</option>
                <option value="POWER_FAILURE">Power Failure</option>
                <option value="WATER_DISRUPTION">Water Disruption</option>
                <option value="GAS_LEAK">Gas Leak</option>
                <option value="NETWORK_OUTAGE">Network Outage</option>
              </select>
            </div>
            <div class="form-group">
              <label for="severity" class="form-label">Severity</label>
              <select id="severity" class="form-control" required>
                <option value="" disabled selected>Select severity</option>
                <option value="LOW">Low</option>
                <option value="MEDIUM">Medium</option>
                <option value="HIGH">High</option>
                <option value="CRITICAL">Critical</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="affectedArea" class="form-label">Affected Area / District</label>
            <input type="text" id="affectedArea" class="form-control" placeholder="e.g. Central Sector B" required>
          </div>

          <div class="form-group">
            <label for="restorationTime" class="form-label">Estimated Restoration Time</label>
            <input type="datetime-local" id="restorationTime" class="form-control" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" id="cancel-modal-btn" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">File Outage Report</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="utilities.js"></script>
</body>
</html>
