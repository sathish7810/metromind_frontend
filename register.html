<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetroMind - Register Account</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <div class="auth-card" style="max-width: 500px;">
    <div class="auth-header">
      <div class="auth-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2zm0 3.99L19.53 19H4.47L12 5.99zM13 16h-2v2h2v-2zm0-6h-2v4h2v-4z"/></svg>
      </div>
      <h1 class="auth-title">Register Authority</h1>
      <p class="auth-subtitle">Create a smart city administrator or supervisor account</p>
    </div>

    <form id="register-form">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <input type="text" id="username" class="form-control" placeholder="e.g. jdoe" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="new-password">
        </div>
      </div>

      <div class="form-group">
        <label for="fullName" class="form-label">Full Name</label>
        <input type="text" id="fullName" class="form-control" placeholder="e.g. John Doe" required autocomplete="name">
      </div>

      <div class="form-group">
        <label for="role" class="form-label">System Role</label>
        <select id="role" class="form-control" required>
          <option value="" disabled selected>Select system authorization role</option>
          <option value="CITY_ADMINISTRATOR">City Administrator (Full Access)</option>
          <option value="TRAFFIC_CONTROLLER">Traffic Controller (Incidents & Dispatches)</option>
          <option value="UTILITY_SUPERVISOR">Utility Supervisor (Grids & Outages)</option>
          <option value="FIELD_TECHNICIAN">Field Technician (Alert Access)</option>
          <option value="CIVIC_ANALYST">Civic Analyst (Analytics & Alerts)</option>
        </select>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
        <div class="form-group">
          <label for="district" class="form-label">District Jurisdiction</label>
          <input type="text" id="district" class="form-control" placeholder="e.g. Central, North" required>
        </div>
        <div class="form-group">
          <label for="badgeNumber" class="form-label">Badge Number</label>
          <input type="text" id="badgeNumber" class="form-control" placeholder="e.g. TRC-402" required>
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">
        Register and Login
      </button>
    </form>

    <div class="auth-footer">
      <p>Already have an access key? <a href="login.html" class="auth-link">Sign In</a></p>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="register.js"></script>
</body>
</html>
